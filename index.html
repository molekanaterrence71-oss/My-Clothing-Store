<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">AU<span>RA</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <a href="search.html"><i class="fas fa-search"></i></a>
                <a href="wishlist.html"><i class="far fa-heart"></i></a>
                <a href="cart.html"><i class="fas fa-shopping-cart"></i><span id="cart-count">0</span></a>

            </div>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Define Your <span>Style</span></h1>

            <a href="shop.html" class="btn-primary">Shop Now</a>

    <section class="categories section-padding">
        <h2 class="section-title">Shop by Category</h2>
        <div class="category-grid">
            <div class="category-card glass-card">
                <h3>Men's Collection</h3>
                <a href="shop.html?category=mens" class="btn-secondary">Explore</a>
            </div>
            <div class="category-card glass-card">
                <h3>Women's Collection</h3>
                <a href="shop.html?category=womens" class="btn-secondary">Explore</a>
            </div>
            <div class="category-card glass-card">
                <h3>Accessories</h3>
                <a href="shop.html?category=accessories" class="btn-secondary">Explore</a>
            </div>
        </div>
    </section>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/main.js"></script>
